<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/">
  <title>Админка — 21 день с ИИ</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; background: #1a1a2e; color: #eee; }
    .login-box { max-width: 320px; margin: 60px auto; padding: 24px; background: #16213e; border-radius: 8px; }
    .login-box input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 4px; border: 1px solid #0f3460; background: #0f3460; color: #eee; }
    .login-box button { width: 100%; padding: 12px; margin-top: 8px; background: #e94560; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .login-box button:hover { background: #ff6b6b; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .admin-header h1 { margin: 0; font-size: 1.25rem; }
    .admin-header button { padding: 8px 16px; background: #444; border: none; border-radius: 4px; color: #eee; cursor: pointer; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tabs button { padding: 10px 20px; background: #16213e; border: 1px solid #0f3460; color: #eee; border-radius: 4px; cursor: pointer; }
    .tabs button.active { background: #e94560; border-color: #e94560; }
    .panel { display: none; }
    .panel.active { display: block; }
    .section { background: #16213e; padding: 16px; margin-bottom: 16px; border-radius: 8px; }
    .section h3 { margin: 0 0 12px 0; font-size: 1rem; color: #e94560; }
    .section label { display: block; margin: 8px 0 4px 0; font-size: 0.9rem; color: #aaa; }
    .section input, .section textarea { width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 4px; border: 1px solid #0f3460; background: #0f3460; color: #eee; }
    .section textarea { min-height: 60px; resize: vertical; }
    .card-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
    .card-row input, .card-row textarea { flex: 1; }
    .card-row button { padding: 6px 12px; background: #c00; border: none; border-radius: 4px; color: #fff; cursor: pointer; flex-shrink: 0; }
    .btn-save { padding: 10px 24px; background: #28a745; color: #fff; border: none; border-radius: 4px; cursor: pointer; margin-top: 12px; }
    .btn-save:hover { background: #218838; }
    .ref-list { list-style: none; padding: 0; margin: 0; }
    .ref-list li { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #0f3460; margin-bottom: 6px; border-radius: 4px; }
    .ref-list .ref-code { font-weight: 600; }
    .ref-list .ref-meta { font-size: 0.85rem; color: #888; }
    .ref-list button { padding: 4px 10px; background: #c00; border: none; border-radius: 4px; color: #fff; cursor: pointer; }
    .add-ref { display: flex; gap: 8px; margin-bottom: 16px; }
    .add-ref input { flex: 1; padding: 10px; border-radius: 4px; border: 1px solid #0f3460; background: #0f3460; color: #eee; }
    .add-ref button { padding: 10px 20px; background: #28a745; border: none; border-radius: 4px; color: #fff; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #0f3460; }
    th { color: #e94560; }
    .ref-badge { background: #28a745; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
    .msg { padding: 10px; margin: 8px 0; border-radius: 4px; }
    .msg.ok { background: #1e4620; }
    .msg.err { background: #5c1010; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="loginScreen" class="login-box">
    <h2>Вход в админку</h2>
    <form id="loginForm" onsubmit="return doLogin(event)">
      <input type="password" id="password" placeholder="Пароль" required autocomplete="current-password">
      <button type="submit">Войти</button>
    </form>
    <div id="loginError" class="msg err hidden"></div>
  </div>

  <div id="adminScreen" class="hidden">
    <div class="admin-header">
      <h1>Админка — 21 день с ИИ</h1>
      <button onclick="doLogout()">Выйти</button>
    </div>
    <div class="tabs">
      <button class="active" data-tab="content">Контент</button>
      <button data-tab="referrals">Рефералы</button>
    </div>

    <div id="contentPanel" class="panel active">
      <div id="contentSections"></div>
      <button class="btn-save" onclick="saveContent()">Сохранить весь контент</button>
      <div id="contentMsg" class="msg hidden"></div>
    </div>

    <div id="referralsPanel" class="panel">
      <div class="section">
        <h3>Новый реферальный код</h3>
        <div class="add-ref">
          <input type="text" id="newRefCode" placeholder="Код (латиница, цифры)" maxlength="30">
          <button onclick="addReferral()">Создать</button>
        </div>
        <div id="refMsg" class="msg hidden"></div>
      </div>
      <div class="section">
        <h3>Реферальные ссылки</h3>
        <p style="font-size:0.9rem;color:#888">Ссылка: https://promo.21day.club/?ref=КОД</p>
        <ul id="refList" class="ref-list"></ul>
      </div>
      <div class="section">
        <h3>Оплаты (с отметкой реферала)</h3>
        <table>
          <thead><tr><th>Заказ</th><th>Email</th><th>Имя</th><th>Тариф</th><th>Сумма</th><th>Реферал</th><th>Дата</th></tr></thead>
          <tbody id="paymentsTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API = '/admin';
    function showMsg(elId, text, isErr) {
      const el = document.getElementById(elId);
      if (!el) return;
      el.textContent = text;
      el.className = 'msg ' + (isErr ? 'err' : 'ok');
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }
    async function doLogin(e) {
      e.preventDefault();
      const pw = document.getElementById('password').value;
      const err = document.getElementById('loginError');
      try {
        const r = await fetch(API + '/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pw }) });
        const j = await r.json();
        if (r.ok && j.ok) {
          document.getElementById('loginScreen').classList.add('hidden');
          document.getElementById('adminScreen').classList.remove('hidden');
          loadContent();
          loadReferrals();
          loadPayments();
        } else {
          err.textContent = j.error || 'Ошибка входа';
          err.classList.remove('hidden');
        }
      } catch (x) {
        err.textContent = 'Ошибка сети';
        err.classList.remove('hidden');
      }
      return false;
    }
    async function doLogout() {
      await fetch(API + '/logout', { method: 'POST' });
      document.getElementById('adminScreen').classList.add('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
    }
    async function checkAuth() {
      const r = await fetch(API + '/content');
      if (r.ok) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('adminScreen').classList.remove('hidden');
        loadContent();
        loadReferrals();
        loadPayments();
      }
    }
    document.querySelectorAll('.tabs button').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        document.getElementById(b.dataset.tab + 'Panel').classList.add('active');
      });
    });

    let contentData = {};
    async function loadContent() {
      const r = await fetch(API + '/content');
      if (!r.ok) return;
      contentData = await r.json();
      renderContent();
    }
    function renderContent() {
      const container = document.getElementById('contentSections');
      const sections = ['problems','whom','results','method','bonuses','faq'];
      container.innerHTML = sections.map(s => renderSection(s, contentData[s])).join('');
    }
    function renderSection(key, sec) {
      if (!sec) return '';
      let html = '<div class="section"><h3>' + (sec.title || key) + '</h3>';
      if (sec.title !== undefined) html += '<label>Заголовок</label><input type="text" data-section="' + key + '" data-field="title" value="' + escapeHtml(sec.title) + '">';
      if (sec.subtitle !== undefined) html += '<label>Подзаголовок</label><input type="text" data-section="' + key + '" data-field="subtitle" value="' + escapeHtml(sec.subtitle) + '">';
      if (sec.cards) {
        sec.cards.forEach((c, i) => {
          html += '<div class="card-row">';
          if (c.title !== undefined) html += '<input type="text" data-section="' + key + '" data-card="' + i + '" data-field="title" placeholder="Заголовок" value="' + escapeHtml(c.title) + '">';
          html += '<textarea data-section="' + key + '" data-card="' + i + '" data-field="text" placeholder="Текст">' + escapeHtml(c.text || '') + '</textarea>';
          html += '</div>';
        });
      }
      if (sec.items) {
        sec.items.forEach((it, i) => {
          html += '<div class="card-row"><input type="text" data-section="' + key + '" data-item="' + i + '" data-field="q" placeholder="Вопрос" value="' + escapeHtml(it.q || '') + '">';
          html += '<textarea data-section="' + key + '" data-item="' + i + '" data-field="a" placeholder="Ответ">' + escapeHtml(it.a || '') + '</textarea></div>';
        });
      }
      html += '</div>';
      return html;
    }
    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function collectContentFromForm() {
      document.querySelectorAll('#contentSections [data-section]').forEach(el => {
        const sec = el.dataset.section;
        const field = el.dataset.field;
        const card = el.dataset.card;
        const item = el.dataset.item;
        if (card !== undefined) {
          if (!contentData[sec].cards[card]) contentData[sec].cards[card] = {};
          contentData[sec].cards[card][field] = el.value;
        } else if (item !== undefined) {
          if (!contentData[sec].items[item]) contentData[sec].items[item] = {};
          contentData[sec].items[item][field] = el.value;
        } else {
          contentData[sec][field] = el.value;
        }
      });
      return contentData;
    }
    async function saveContent() {
      collectContentFromForm();
      const r = await fetch(API + '/content', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(contentData) });
      if (r.ok) showMsg('contentMsg', 'Сохранено', false);
      else showMsg('contentMsg', 'Ошибка сохранения', true);
    }
    async function addReferral() {
      const code = document.getElementById('newRefCode').value.trim().toLowerCase();
      if (!code || code.length < 2) { showMsg('refMsg', 'Код минимум 2 символа', true); return; }
      const r = await fetch(API + '/referrals', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code }) });
      const j = await r.json();
      if (r.ok) {
        document.getElementById('newRefCode').value = '';
        showMsg('refMsg', 'Создано', false);
        loadReferrals();
      } else showMsg('refMsg', j.error || 'Ошибка', true);
    }
    async function deleteReferral(code) {
      if (!confirm('Удалить реферал ' + code + '?')) return;
      const r = await fetch(API + '/referrals/' + encodeURIComponent(code), { method: 'DELETE' });
      if (r.ok) loadReferrals();
    }
    async function loadReferrals() {
      const r = await fetch(API + '/referrals');
      if (!r.ok) return;
      const j = await r.json();
      const ul = document.getElementById('refList');
      ul.innerHTML = (j.referrals || []).map(ref =>
        '<li><span><span class="ref-code">' + escapeHtml(ref.code) + '</span><span class="ref-meta"> — оплат: ' + (ref.payments_count || 0) + '</span></span><button data-ref="' + escapeHtml(ref.code) + '" onclick="deleteReferral(this.dataset.ref)">Удалить</button></li>'
      ).join('') || '<li style="color:#888">Нет рефералов</li>';
    }
    async function loadPayments() {
      const r = await fetch(API + '/payments');
      if (!r.ok) return;
      const j = await r.json();
      const tbody = document.getElementById('paymentsTable');
      tbody.innerHTML = (j.payments || []).map(p =>
        '<tr><td>#' + p.inv_id + '</td><td>' + escapeHtml(p.email) + '</td><td>' + escapeHtml(p.name) + '</td><td>' + (p.plan || '-') + '</td><td>' + (p.out_sum || 0) + ' ₽</td><td>' + (p.ref_code ? '<span class="ref-badge">' + escapeHtml(p.ref_code) + '</span>' : '-') + '</td><td>' + (p.paid_at || '') + '</td></tr>'
      ).join('') || '<tr><td colspan="7">Нет оплат</td></tr>';
    }
    checkAuth();
  </script>
</body>
</html>
